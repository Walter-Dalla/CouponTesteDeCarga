spring:
  application:
    name: coupon
  datasource:
    url: jdbc:h2:mem:coupondb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console
  docker:
    compose:
      enabled: false
swagger:
  server-url: ${SWAGGER_SERVER_URL:http://localhost:8080}
springdoc:
  swagger-ui:
    path: /swagger-ui.html
server:
  forward-headers-strategy: framework